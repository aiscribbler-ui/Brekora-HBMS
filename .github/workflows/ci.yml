name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio httpx pytest-cov
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy app

      - name: Test (pytest)
        run: pytest --junitxml=junit.xml -o junit_family=legacy

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-py${{ matrix.python-version }}
          path: backend/junit.xml

  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18']
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint
        env:
          ESLINT_USE_FLAT_CONFIG: false

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test (vitest)
        run: npx vitest run --reporter=json --outputFile=vitest-report.json

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results-node${{ matrix.node-version }}
          path: frontend/vitest-report.json

  services:
    name: Docker Compose Stack
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start stack
        run: docker compose up --build --wait -d
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: brekora
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/brekora
          SECRET_KEY: ci-secret-ci-secret-ci-secret
          REDIS_URL: redis://redis:6379/0
          ENVIRONMENT: production
          VITE_API_URL: http://localhost:8000

      - name: Health check API
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/api/v1/health && exit 0
            sleep 2
          done
          exit 1

      - name: Health check frontend
        run: |
          for i in {1..30}; do
            curl -sf http://localhost/ && exit 0
            sleep 2
          done
          exit 1

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [services]
    defaults:
      run:
        working-directory: ./e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: e2e/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Seed E2E data
        run: docker compose exec -T api python scripts/seed_e2e.py
        env:
          COMPOSE_FILE: docker-compose.yml

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
